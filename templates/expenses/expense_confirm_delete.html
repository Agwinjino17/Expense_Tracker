{% extends 'base.html' %}

{% block title %}Delete entry - Ledger{% endblock %}

{% block content %}
<div class="confirm-card">
    <h1>Delete this entry?</h1>
    <p>"{{ expense.title }}" for &#8377;{{ expense.amount }} on {{ expense.date|date:"d M Y" }} will be permanently removed. This can't be undone.</p>

    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn btn-danger">Delete entry</button>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
